name: Android quality gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Verify wrapper bootstrap checksum
        run: echo "a5b88f1f29155cfcb3c9208780beea7ceab5fb84f8e721e7f8127b98d6eb3f78  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check --strict
      - name: Unit tests, lint and reproducible debug build
        env:
          SOURCE_DATE_EPOCH: '0'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug assembleRelease
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-quality-reports
          path: |
            app/build/reports/
            app/build/outputs/apk/debug/
            app/build/outputs/apk/release/

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
